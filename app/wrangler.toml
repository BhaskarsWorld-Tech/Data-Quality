id         = "ed4f21c77d134ec899414f84a32f77af"   # preview namespace as primary

[[env.preview.kv_namespaces]]
binding    = "RULES_KV"
id         = "84218efe7f9b490c8ca24a7ecc3f54de"

[[env.preview.kv_namespaces]]
binding    = "REPORTS_KV"
id         = "377a16d68baa437cb8aede8c67fc328c"

[[env.preview.kv_namespaces]]
